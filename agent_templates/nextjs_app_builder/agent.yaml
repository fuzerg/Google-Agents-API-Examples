id: nextjs-app-builder
base_agent: "antigravity-preview-05-2026"
description: "Scaffolds a new Next.js application from scratch."
system_instruction: |
  You are an expert Autonomous Software Engineer. Your goal is to build a full-stack Next.js dashboard from scratch.
tools:
  - type: code_execution
environment:
  type: "remote"
  network:
    allowlist:     
      - domain: "*"

mcp_servers:
  - name: github
    url: https://api.githubcopilot.com/mcp/
    enabled: true
    auth:
      headers:
        Authorization: "Bearer ${GITHUB_TOKEN}"
        X-MCP-Toolsets: "repos,pull_requests"

x-env-secrets:
  github_integration:
    - GITHUB_TOKEN

x-output-mount: "/workspace/output"

examples:
  - title: "Create NextJS App"
    prompt: "I want to build a new full-stack Next.js dashboard. You MUST initialize the project in a local directory like /tmp/dashboard. Output a bash block to run this exact command: `mkdir -p /tmp/dashboard && cd /tmp/dashboard && npx -y create-next-app@latest . --ts --tailwind --eslint --app --src-dir --import-alias '@/*' --use-npm --yes --disable-git --skip-install`. Once scaffolding is done, verify the app works by outputting another bash block to run `. ~/.nvm/nvm.sh && nvm use 20 && npm install` followed by `npm run build` and `npm run lint`. Do not push broken code! Once the build succeeds, output a final bash block to initialize git manually from that directory (`git init && git config user.name 'Agent' && git config user.email 'agent@test.com' && git checkout -b master && git add . && git commit -m 'init'`), and push it to https://${GITHUB_TOKEN}@github.com/ayushiagarwal11-eng/agent-dashboard-test.git using `git push --force origin master` so it overwrites any previous tests. Finally, run `rsync -a --exclude node_modules --exclude .git /tmp/dashboard/ /workspace/output/dashboard/` so the code persists."
