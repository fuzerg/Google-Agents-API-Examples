id: financial-analyst-showcase
base_agent: antigravity-preview-05-2026
description: "A showcase financial analyst agent with GCS-mounted stock and PDF tools."
tools:
  - type: google_search
  - type: code_execution
environment:
  type: "remote"
  sources:
    - type: "gcs"
      source: "gs://${GCS_BUCKET}/financial_analyst/skills"
      target: "/.agents/skills"
      x-upload-from: "skills"
  network:
    allowlist:
      - domain: "*"

# prober.py dynamically mounts `{bucket}/{agent_id}` at `target` in the agent's base
# environment, so every agent writes to its own unique prefix.
x-output-mount:
  target: "/workspace/output"
  bucket: "gs://${GCS_BUCKET}/financial_analyst/output"

examples:
  - title: "google"
    prompt: "Research GOOG and it's competitors. Research their recent news, analyze their stock performance, and generate the PDF report."
  
  - title: "semiconductor"
    prompt: "Research high potential 3 semiconductor companies. Research their recent news, analyze their stock performance, and generate the PDF report."
