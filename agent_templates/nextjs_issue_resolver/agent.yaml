id: nextjs-issue-resolver
base_agent: antigravity-preview-05-2026
description: "Resolves GitHub issues on an existing codebase."
environment:
  type: "remote"
  sources: []
  network:
    allowlist:     
      - domain: "*"

mcp_servers:
  - name: github
    url: https://api.githubcopilot.com/mcp/
    enabled: true
    auth:
      headers:
        Authorization: "Bearer ${GITHUB_TOKEN}"
        X-MCP-Toolsets: "repos,pull_requests"

x-output-mount: "/workspace/output"

examples:
  - title: "Resolve Issue and Add Tests"
    prompt: "Please use the `github` MCP server tools to fetch the details of Issue #1 in repository `ayushiagarwal11-eng/agent-dashboard-test`. Read the issue body to understand what needs to be fixed. Next, clone the repository `https://${GITHUB_TOKEN}@github.com/ayushiagarwal11-eng/agent-dashboard-test.git` into `/workspace/local-temp/issue-fix`. Modify the code to address the issue. Next, install Jest and React Testing Library (`npm install -D jest jest-environment-jsdom @testing-library/react @testing-library/dom @testing-library/jest-dom`), configure Jest for Next.js, and write a unit test in `src/app/page.test.tsx` that asserts the fix works correctly. Verify everything works by running `. ~/.nvm/nvm.sh && nvm use 20 && npm run build && npm test`. Only if all tests pass, create a new branch named 'fix/issue-1', commit the changes, and push it to origin. Then, use the `github` MCP server tools to open a Pull Request from 'fix/issue-1' to the 'main' branch, and assign the PR to the repository owner 'ayushiagarwal11-eng' for review."
