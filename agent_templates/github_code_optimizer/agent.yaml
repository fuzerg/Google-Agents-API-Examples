# Target repository: https://github.com/fuzerg/Slow-Code-Example
id: github-code-optimizer-showcase
base_agent: antigravity-preview-05-2026
description: "A showcase agent that retrieves code from GitHub, benchmarks and optimizes it in the Cloud Sandbox, and opens a PR with performance results — using GitHub's official remote MCP server for every repository operation (no self-hosted helper)."

# The agent still needs the sandbox to benchmark the original vs. optimized code.
# All GitHub operations (read file, create branch, commit, open PR) are handled
# by the remote MCP server declared below, not by a mounted skill.
system_instruction: |
  CRITICAL: You are running locally via a python prober script. You must output exactly formatted ````bash ```` blocks to run shell commands. The prober will run them and return the output.
  CRITICAL: DO NOT ever run `pkill -f next` or `pkill -f python` or similar kill commands, as you will kill your own host prober script and commit suicide.

x-output-mount: "/workspace/output"
# ---------------------------------------------------------------------------
# GitHub's official, fully-managed remote MCP server.
#
# The Gemini Enterprise Agent Platform securely routes the model's tool calls to
# this URL, forwarding the headers built from `auth` below (baked into the
# self-contained agent). Nothing to host — this replaces the old GCS-mounted
# `github_automation` skill + `github_helper.py`.
#
# Auth: the remote server accepts any valid GitHub access token in the
# Authorization header; here we pass a Personal Access Token (PAT) as a Bearer
# token. The value is interpolated at runtime from the GITHUB_TOKEN env var
# (loaded from this template's .env), so no credential is stored in this file.
#   Reference: https://github.com/github/github-mcp-server/blob/main/docs/remote-server.md
#
# `X-MCP-Toolsets` scopes the exposed tools down to just what this workflow needs
# (repository file ops + pull requests) instead of the full default surface.
# Remove the header to expose the default toolset, or set it to e.g.
# "repos,pull_requests,issues". Add `X-MCP-Readonly: "true"` to forbid writes.
# ---------------------------------------------------------------------------
mcp_servers:
  - name: github
    url: https://api.githubcopilot.com/mcp/
    enabled: true
    auth:
      headers:
        Authorization: "Bearer ${GITHUB_TOKEN}"
        X-MCP-Toolsets: "repos,pull_requests"

environment:
  type: "remote"
  network:
    allowlist:
      - domain: "*"

examples:
  - title: "Optimize fibonacci.py"
    prompt: |
      Optimize fibonacci.py.

      Repository details:
      - Repository Owner: fuzerg
      - Repository Name: Slow-Code-Example

  - title: "Optimize find_duplicates.py"
    prompt: |
      Optimize find_duplicates.py.

      Repository details:
      - Repository Owner: fuzerg
      - Repository Name: Slow-Code-Example
  - title: "Optimize data_aggregation.py"
    prompt: |
      Optimize data_aggregation.py.

      Repository details:
      - Repository Owner: fuzerg
      - Repository Name: Slow-Code-Example
