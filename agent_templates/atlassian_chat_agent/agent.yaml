id: atlassian-chat-agent-showcase
base_agent: antigravity-preview-05-2026

# Model used for the stateful Interactions API turns run by chat.py.
# Must be a current tool-capable model (legacy gemini-2.0 / 1.5 are unsupported).
model: gemini-2.5-pro

description: >-
  An Atlassian assistant that connects to Atlassian's official, fully-managed
  remote Rovo MCP Server to read, search, and (when permitted) update Jira and
  Confluence on the user's behalf — no self-hosted MCP server required.

# ---------------------------------------------------------------------------
# Atlassian's official hosted remote MCP server ("Rovo MCP Server").
#
# This endpoint is operated by Atlassian. The Gemini Enterprise Agent Platform
# securely routes the model's tool calls to this URL, forwarding the headers
# built from `auth` below (baked into the self-contained agent). Nothing to host.
#
# `/v1/sse` is deprecated after 2026-06-30; use the streamable-HTTP `/v1/mcp`.
# Reference:
#   https://support.atlassian.com/atlassian-rovo-mcp-server/docs/getting-started-with-the-atlassian-remote-mcp-server/
#
# Auth is a raw `headers` map whose values reference env vars (${VAR}); the
# runners never see raw credentials in this file. The Rovo MCP server supports
# non-interactive API-token auth (no browser); your Atlassian org admin must
# first ENABLE "authentication via API token", and the token must carry the
# required product scopes.
#
#   Personal API token  -> Authorization: Basic <base64(email:api_token)>
#   Service-account key  -> Authorization: Bearer <api_key>
#
# Set ATLASSIAN_AUTH_HEADER to the FULL header value, e.g.:
#   ATLASSIAN_AUTH_HEADER="Basic $(printf '%s' "$EMAIL:$API_TOKEN" | base64)"
#   ATLASSIAN_AUTH_HEADER="Bearer <service-account-api-key>"
# (Rovo rejects personal tokens sent as Bearer.) Never commit real tokens.
# Reference:
#   https://support.atlassian.com/atlassian-rovo-mcp-server/docs/configuring-authentication-via-api-token/
# ---------------------------------------------------------------------------
mcp_servers:
  - name: atlassian
    url: https://mcp.atlassian.com/v1/mcp
    enabled: true
    auth:
      headers:
        Authorization: "${ATLASSIAN_AUTH_HEADER}"

# Sequential prompts run by chat.py. Each example is an independent, stateful
# conversation (interactive multi-turn is available via `chat.py --interactive`).
#
# Defaults are READ/SEARCH only so they are safe to run repeatedly. Write-capable
# tools (create issue, transition, create page, ...) are still available to the
# agent — try them in `--interactive`, where it will confirm before mutating.
# See README.md for write examples.
examples:
  - title: "who_am_i"
    prompt: "Who am I in Atlassian, and which Atlassian sites can I access? List each site name with its cloudId."

  - title: "my_open_jira_issues"
    prompt: "Find Jira issues assigned to me that are still open, ordered by priority. Give me a concise, prioritized summary of what needs my attention."

  - title: "jira_project_overview"
    prompt: "List the Jira projects I can access, then for the most active one summarize the open issues by status."

  - title: "confluence_search_and_summarize"
    prompt: "Search Confluence for our onboarding documentation and summarize the most relevant page in 5 bullet points, with a link."
