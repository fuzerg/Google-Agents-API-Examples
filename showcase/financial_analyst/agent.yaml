id: financial-analyst-showcase
base_agent: antigravity-preview-05-2026
description: "A showcase financial analyst agent with GCS-mounted stock and PDF tools."
tools:
  - type: google_search
  - type: code_execution
environment:
  type: "remote"
  sources:
    - type: "gcs"
      source: "gs://${GCS_BUCKET}/financial_analyst"
      target: "/.agents/skills/financial_analyst"
  network:
    allowlist:
      - domain: "*"

x-output-mount: "/workspace/output"

examples:
  - title: "google"
    prompt: "Research GOOG and it's competitors. Research their recent news, analyze their stock performance, and generate the PDF report."
  
  - title: "semiconductor"
    prompt: "Research high potential 3 semiconductor companies. Research their recent news, analyze their stock performance, and generate the PDF report."
